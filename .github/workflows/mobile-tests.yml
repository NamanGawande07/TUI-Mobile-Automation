name: Mobile Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  android-tests:
    name: Android UI Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium --version
          appium driver list --installed

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_4
          force-avd-creation: true
          emulator-boot-timeout: 900
          disable-linux-hw-accel: false
          disable-animations: true
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-snapshot
            -no-snapshot-save
            -no-metrics
          script: |
            set -eu

            wait_for_http() {
              url="$1"
              max_attempts="$2"
              delay_seconds="$3"

              attempt=1
              while [ "$attempt" -le "$max_attempts" ]; do
                if curl -fsS "$url" >/dev/null 2>&1; then
                  return 0
                fi

                echo "Waiting for HTTP endpoint: $url (attempt $attempt/$max_attempts)"
                sleep "$delay_seconds"
                attempt=$((attempt + 1))
              done

              echo "Timed out waiting for endpoint: $url"
              return 1
            }

            retry_cmd() {
              max_attempts="$1"
              delay_seconds="$2"
              shift 2

              attempt=1
              while [ "$attempt" -le "$max_attempts" ]; do
                if "$@"; then
                  return 0
                fi

                echo "Command failed (attempt $attempt/$max_attempts): $*"
                sleep "$delay_seconds"
                attempt=$((attempt + 1))
              done

              echo "Command failed after $max_attempts attempts: $*"
              return 1
            }

            echo "===== Stabilizing ADB ====="
            adb kill-server || true
            retry_cmd 5 2 adb start-server
            retry_cmd 5 2 adb devices

            echo "===== ADB Devices ====="
            adb devices

            echo "===== Waiting for Android Boot ====="
            adb wait-for-device

            until [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do
              echo "Android not fully booted yet..."
              sleep 2
            done

            until [ "$(adb shell getprop init.svc.bootanim | tr -d '\r')" = "stopped" ]; do
              echo "Boot animation still running..."
              sleep 2
            done

            adb shell input keyevent 82 || true
            adb shell wm dismiss-keyguard || true

            echo "===== Device Information ====="
            adb shell getprop ro.build.version.release
            adb shell getprop ro.product.model

            echo "===== Starting Appium ====="
            appium --address 127.0.0.1 --port 4723 --base-path / --log appium.log > appium-console.log 2>&1 &

            echo "===== Waiting for Appium ====="
            wait_for_http http://127.0.0.1:4723/status 30 2

            echo "===== Verifying APK ====="
            wait_for_http http://127.0.0.1:4723/status 30 2

            if [ ! -f apps/app.apk ]; then
              echo "ERROR: apps/app.apk not found"
              ls -la apps || true
              exit 1
            fi

            echo "===== Running Maven Tests ====="
            mvn --batch-mode --no-transfer-progress clean test -DexplicitWait=60

            echo "===== Generating Allure HTML Report ====="
            mvn --batch-mode --no-transfer-progress allure:report
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-artifacts
          if-no-files-found: warn
          path: |
            target/surefire-reports/**
            target/allure-results/**
            target/site/allure-maven-plugin/**
            reports/**
            screenshots/**
            appium.log
            appium-console.log