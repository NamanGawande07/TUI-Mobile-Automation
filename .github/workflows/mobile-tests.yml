name: Mobile Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  android-tests:
    name: Android UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium --version
          appium driver list --installed

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none -no-snapshot-save
          disable-linux-hw-accel: false
          disable-animations: true
          script: |
            set -eu
            adb kill-server
            adb start-server
            adb wait-for-device
            adb devices
            appium --port 4723 --log appium.log > appium-console.log 2>&1 &
            i=1
            while [ "$i" -le 20 ]; do
              if curl -fsS http://127.0.0.1:4723/status >/dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "Appium did not become ready in time" >&2
                exit 1
              fi
              i=$((i + 1))
              sleep 2
            done
            test -f "$GITHUB_WORKSPACE/apps/app.apk"
            mvn clean test \
              -DdeviceName=AndroidEmulator \
              -Dudid=emulator-5554 \
              -DplatformVersion=15 \
              -Dapp="$GITHUB_WORKSPACE/apps/app.apk" \
              -DscreenshotDir=screenshots
            mvn allure:report

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-artifacts
          path: |
            reports/cucumber/**
            target/surefire-reports/**
            target/allure-results/**
            target/site/allure-maven-plugin/**
            screenshots/**
            appium.log
            appium-console.log
          if-no-files-found: warn
