name: Mobile Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  android-tests:
    name: Android UI Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium --version
          appium driver list --installed

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_4
          force-avd-creation: true
          emulator-boot-timeout: 900
          disable-linux-hw-accel: false
          disable-animations: true
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-snapshot
            -no-snapshot-save
            -no-metrics
          script: |
            set -eu

            echo "===== Stabilizing ADB ====="
            adb kill-server || true

            i=1
            while [ "$i" -le 5 ]; do
              if adb start-server; then
                break
              fi
              echo "adb start-server failed (attempt $i/5)"
              sleep 2
              i=$((i + 1))
            done

            i=1
            while [ "$i" -le 5 ]; do
              if adb devices; then
                break
              fi
              echo "adb devices failed (attempt $i/5)"
              sleep 2
              i=$((i + 1))
            done

            echo "===== ADB Devices ====="
            adb devices

            echo "===== Waiting for Android Boot ====="
            adb wait-for-device

            until [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do
              echo "Android not fully booted yet..."
              sleep 2
            done

            until [ "$(adb shell getprop init.svc.bootanim | tr -d '\r')" = "stopped" ]; do
              echo "Boot animation still running..."
              sleep 2
            done

            adb shell input keyevent 82 || true
            adb shell wm dismiss-keyguard || true

            echo "===== Device Information ====="
            adb shell getprop ro.build.version.release
            adb shell getprop ro.product.model

            echo "===== Starting Appium ====="
            appium --address 127.0.0.1 --port 4723 --base-path / --log appium.log > appium-console.log 2>&1 &

            echo "===== Waiting for Appium ====="
            i=1
            until curl -fsS http://127.0.0.1:4723/status >/dev/null 2>&1; do
              if [ "$i" -ge 30 ]; then
                echo "Timed out waiting for Appium"
                exit 1
              fi
              echo "Waiting for Appium (attempt $i/30)"
              sleep 2
              i=$((i + 1))
            done

            echo "===== Verifying APK ====="
            if [ ! -f apps/app.apk ]; then
              echo "ERROR: apps/app.apk not found"
              ls -la apps || true
              exit 1
            fi

            echo "===== Running Maven Tests ====="
            mvn --batch-mode --no-transfer-progress clean test -DexplicitWait=60

            echo "===== Generating Allure HTML Report ====="
            mvn --batch-mode --no-transfer-progress allure:report
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-artifacts
          if-no-files-found: warn
          path: |
            target/surefire-reports/**
            target/allure-results/**
            target/site/allure-maven-plugin/**
            reports/**
            screenshots/**
            appium.log
            appium-console.log